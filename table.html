<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#3d4a2a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="Choose a cassette — A Father's Day gift for Papa, with pride">
  <title>Choose a Cassette — For Papa</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="page-table">

  <canvas id="sky-canvas" aria-hidden="true"></canvas>

  <div class="army-backdrop" aria-hidden="true">
    <span class="army-badge">With Pride</span>
    <span class="army-corner army-corner--tl"></span>
    <span class="army-corner army-corner--tr"></span>
    <span class="army-corner army-corner--bl"></span>
    <span class="army-corner army-corner--br"></span>
  </div>

  <div class="table-glow" aria-hidden="true"></div>

  <main class="page-table-wrap" aria-label="Cassette table">
    <div class="table-card">
      <div class="galaxy-header">
        <p class="scene-title">Choose a cassette, Papa</p>
        <p class="hint-text">Drag a tape into the player below</p>
      </div>

      <div class="tape-shelf">
        <p class="tape-shelf-label">✦ Your tapes ✦</p>
        <div class="tape-row" id="tape-row">
          <div class="pool-tape idle" data-id="1" id="tape-1">
            <div class="tape-3d">
              <div class="tape-face">
                <div class="tape-photo" aria-hidden="true"></div>
                <div class="tape-window-mini"></div>
              </div>
              <div class="tape-edge"></div>
            </div>
          </div>
          <div class="pool-tape idle" data-id="2" id="tape-2">
            <div class="tape-3d">
              <div class="tape-face">
                <div class="tape-photo" aria-hidden="true"></div>
                <div class="tape-window-mini"></div>
              </div>
              <div class="tape-edge"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="player-zone">
        <div class="player-unit" id="player-unit">
          <div class="player-body" id="player-body">
            <div class="player-top">
              <span class="player-brand">Kids · Mix</span>
              <span class="player-led" id="player-led" aria-hidden="true"></span>
            </div>

            <div class="player-display">
              <div class="display-cover-box">
                <img id="disp-cover" src="" alt="" hidden>
              </div>
              <div class="display-info">
                <p class="display-title" id="disp-title">No cassette</p>
                <p class="display-sub" id="disp-sub">Insert a tape</p>
              </div>
            </div>

            <div class="deck-slot empty" id="deck-slot">
              <div class="player-cassette" id="player-cassette">
                <div class="pc-slideshow" id="pc-slideshow" aria-hidden="true">
                  <img class="pc-slide" id="pc-slide-a" src="" alt="" hidden>
                  <img class="pc-slide" id="pc-slide-b" src="" alt="" hidden>
                </div>
                <div class="pc-window">
                  <div class="pc-reel" id="reel-l"></div>
                  <div class="pc-reel" id="reel-r"></div>
                </div>
              </div>
            </div>

            <div class="player-actions">
              <div class="skip-controls" id="skip-controls" hidden>
                <button type="button" class="ctrl ctrl-skip" id="btn-skip-10">+10s</button>
                <button type="button" class="ctrl ctrl-skip" id="btn-skip-15">+15s</button>
              </div>

              <div class="player-controls">
                <button type="button" class="ctrl ctrl-play" id="btn-play" disabled>Play</button>
                <button type="button" class="ctrl ctrl-pause" id="btn-pause" disabled>Pause</button>
                <button type="button" class="ctrl ctrl-eject" id="btn-eject" disabled>Eject</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    Made with love by your kids,<br>
    <em>Deep and Lisa</em> ❤️
  </footer>

  <audio id="audio" preload="auto"></audio>

  <script src="sky.js"></script>
  <script src="player.js"></script>
</body>
</html>
